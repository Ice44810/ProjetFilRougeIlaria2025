<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modifier le Profil - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="/public/js/api.js"></script>
    <style>
        .profile-photo-wrapper {
            position: relative;
            display: inline-block;
        }
        .profile-photo-wrapper .camera-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0d6efd;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
            transition: background 0.2s;
        }
        .profile-photo-wrapper .camera-overlay:hover {
            background: #0b5ed7;
        }
        #photoInput {
            display: none;
        }
        .loading-spinner {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item">
                        <a href="./profile.html">Profil</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-gear text-black" style="font-size: 15px;"></span>
                        Gérer le profil
                    </li>
                </ol>
            </nav>
        </div>
        <div class="container-fluid p-3">
            <!-- Profile Photo Section -->
            <div class="text-center mb-4">
                <div class="profile-photo-wrapper">
                    <img src="../public/assets/images/profil.jpg" alt="Profil" class="rounded-circle small-profile-img mb-2"
                        width="100" height="100" id="userAvatar">
                    <label for="photoInput" class="camera-overlay" title="Changer la photo">
                        <i class="bi bi-camera"></i>
                    </label>
                </div>
                <input type="file" id="photoInput" accept="image/*">
                <p class="text-muted small mt-2">Cliquez sur l'icône caméra pour changer votre photo</p>
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Chargement...</span>
                    </div>
                </div>
            </div>

            <!-- Profile Info Edit Form -->
            <form id="editProfileForm">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Modifier les informations</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-muted small" for="inputFullName">Nom complet</label>
                                <input type="text" class="form-control" id="inputFullName" placeholder="Votre nom">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" for="inputEmail">Email (Non modifiable)</label>
                                <input type="email" class="form-control" id="inputEmail" readonly style="background-color: #f8f9fa;">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-muted small" for="inputPhone">Téléphone</label>
                                <input type="tel" class="form-control" id="inputPhone" placeholder="Votre numéro de téléphone">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" for="inputAddress">Adresse</label>
                                <input type="text" class="form-control" id="inputAddress" placeholder="Votre adresse">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-muted small" for="inputPostcode">Code postal</label>
                                <input type="text" class="form-control" id="inputPostcode" placeholder="Code postal">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" for="inputVille">Ville</label>
                                <input type="text" class="form-control" id="inputVille" placeholder="Votre ville">
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary" id="btnSaveProfile">
                            <i class="bi bi-save me-1"></i>Enregistrer les modifications
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            setupPhotoUpload();
            setupFormSubmission();
        });

        // Charger les informations du profil
        async function loadProfile() {
            try {
                const profile = await api.getProfile();
                
                if (profile) {
                    // Pré-remplir les champs
                    document.getElementById('inputFullName').value = profile.fullName || '';
                    document.getElementById('inputEmail').value = profile.email || '';
                    document.getElementById('inputPhone').value = profile.phone || '';
                    document.getElementById('inputAddress').value = profile.address || '';
                    document.getElementById('inputPostcode').value = profile.postcode || '';
                    document.getElementById('inputVille').value = profile.ville || '';
                    
                    // Mettre à jour la photo de profil si elle existe
                    if (profile.avatar) {
                        document.getElementById('userAvatar').src = profile.avatar;
                    }
                }
            } catch (error) {
                console.error('Erreur chargement profil:', error);
                UI.showNotification('Erreur lors du chargement du profil', 'error');
            }
        }

        // Gérer la sauvegarde du formulaire
        function setupFormSubmission() {
            const form = document.getElementById('editProfileForm');
            const btnSave = document.getElementById('btnSaveProfile');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Modifier visuellement le bouton pendant le chargement
                const originalText = btnSave.innerHTML;
                btnSave.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Enregistrement...';
                btnSave.disabled = true;

                const data = {
                    fullName: document.getElementById('inputFullName').value.trim(),
                    phone: document.getElementById('inputPhone').value.trim(),
                    address: document.getElementById('inputAddress').value.trim(),
                    postcode: document.getElementById('inputPostcode').value.trim(),
                    ville: document.getElementById('inputVille').value.trim()
                };

                try {
                    const result = await api.updateProfile(data);
                    if (result.success) {
                        UI.showNotification('Profil mis à jour avec succès', 'success');
                    } else {
                        UI.showNotification(result.error || 'Erreur lors de la mise à jour', 'error');
                    }
                } catch (error) {
                    console.error('Erreur sauvegarde profil:', error);
                    UI.showNotification('Erreur réseau lors de la sauvegarde', 'error');
                } finally {
                    btnSave.innerHTML = originalText;
                    btnSave.disabled = false;
                }
            });
        }

        // Gérer le téléchargement de la photo de profil
        function setupPhotoUpload() {
            const photoInput = document.getElementById('photoInput');
            const spinner = document.getElementById('loadingSpinner');
            const avatar = document.getElementById('userAvatar');

            photoInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Valider le type de fichier
                if (!file.type.startsWith('image/')) {
                    UI.showNotification('Veuillez sélectionner une image', 'error');
                    return;
                }

                // Valider la taille (max 2MB)
                if (file.size > 2 * 1024 * 1024) {
                    UI.showNotification('La taille de l\'image ne doit pas dépasser 2MB', 'error');
                    return;
                }

                // Afficher le spinner
                spinner.style.display = 'block';

                try {
                    // Convertir l'image en base64
                    const base64 = await convertToBase64(file);
                    
                    // Appeler l'API pour mettre à jour la photo
                    const result = await api.updateProfile({ avatar: base64 });
                    
                    if (result.success) {
                        // Mettre à jour l'image affichée
                        avatar.src = base64;
                        UI.showNotification('Photo de profil mise à jour!', 'success');
                    } else {
                        UI.showNotification(result.error || 'Erreur lors de la mise à jour', 'error');
                    }
                } catch (error) {
                    console.error('Erreur upload photo:', error);
                    UI.showNotification('Erreur lors du téléchargement de la photo', 'error');
                } finally {
                    spinner.style.display = 'none';
                    // Réinitialiser l'input
                    photoInput.value = '';
                }
            });
        }

        // Convertir un fichier en base64
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>

</html>

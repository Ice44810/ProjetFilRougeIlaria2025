<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Transfert - Banque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/assets/style.css" />

    <style>
        .dropdown-item img {
            object-fit: contain;
            max-height: 20px;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="./setting.html">Paramètres</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-receipt text-primary" style="font-size: 15px;"></span>
                        Preuves de résidence
                    </li>
                </ol>
            </nav>
        </div>

        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-semibold">Transfert à</h6>
                <a href="./myqr.html" class="text-primary small">Scan QR</a>
            </div>
            <!-- BANK -->
            <div class="form-box">
                <label class="form-label">Banque</label>
                <div class="dropdown" id="bankSelector">
                    <button class="btn btn-white border w-100 d-flex justify-content-between align-items-center"
                        type="button" id="dropdownBankBtn" data-bs-toggle="dropdown" style="height: 50px;">
                        <div class="selected-content d-flex align-items-center gap-2">
                            <span class="text-muted">Sélectionnez votre banque</span>
                        </div>
                        <i class="bi bi-chevron-down text-muted"></i>
                    </button>

                    <ul class="dropdown-menu w-100 shadow-sm" style="max-height: 300px; overflow-y: auto;">
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="#" data-value="Visa">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                    width="25">
                                <span>Visa</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="#"
                                data-value="Techcombank">
                                <img src="../public/assets/images/Techcombank.png" width="25" alt="Techcombank logo">
                                <span>Techcombank</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="../public/assets/images/acbbank.png" width="30" alt="Logo de la banque ACB">
                                <span>ACB</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="../public/assets/images/citigroup.png" width="30"
                                    alt="Logo de la banque Citibank">
                                <span>Citibank</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="../public/assets/images/chasebank.jpeg" width="30"
                                    alt="Logo de la banque Bank of America">
                                <span>Chase Bank</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="../public/assets/images/vietinbank.png" width="30"
                                    alt="Logo de la banque Vietinbank">
                                <span>VietInBank</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="../public/assets/images/fivestarbank.jpeg" width="30"
                                    alt="Logo de la banque Five Star">
                                <span>Five Star</span>
                            </a>
                    </ul>
                    <input type="hidden" name="bank_choice" id="bank_choice_input">
                </div>
            </div>

            <!-- Numéro compte (SELECT) -->
            <div class="form-box" method="post">
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <label class="form-label mb-0">Numéro compte</label>
                    <a href="#" class="text-primary small d-flex align-items-center gap-1 text-decoration-none">
                        Enregister Numéro
                        <i class="bi bi-credit-card-fill fs-6"></i>
                    </a>
                </div>
                <input type="text" class="form-control border p-2 text-muted mt-2" value="1234 0000 2134 3243">
                <div class="form-box">
                    <label class="form-label">Nom du compte</label>
                    <input type="text" class="form-control border p-2 text-muted" value="Themesflat">
                </div>
            </div>

            <!-- Montant transfert -->
            <p class="fw-bold mb-2">Montant</p>
            <div class="position-relative mb-3">
                <input type="text" id="amountInput" class="form-control amount-input ps-3 py-2 text-muted"
                    placeholder="€0">
                <i class="bi bi-x-circle-fill position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                    id="clearAmount" style="cursor: pointer;"></i>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€10</button>
                </div>
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€20</button>
                </div>
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€50</button>
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€75</button>
                </div>
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€100</button>
                </div>
                <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amount-btn">€150</button>
                </div>
            </div>
            <div class="form-box">
                <label class="form-label">Message</label>
                <input type="text" id="messageInput" class="form-control border p-2 text-muted"
                    value="Exemple remboursement restaurant">
            </div>
            <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" id="saveAccountCheck" checked>
                <label class="form-check-label small" for="saveAccountCheck">
                    Enregistrer ce compte pour les futurs transferts
                </label>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end mt-3" id="btnOpenContinue">
        <button class="btn custom-primary-btn mx-5" type="button" id="btnContinue">Continuer</button>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        //Script pour la selection de la banque avec les logos
        document.addEventListener("DOMContentLoaded", function () {
            const dropdownItems = document.querySelectorAll('#bankSelector .dropdown-item');
            const displayElement = document.querySelector('#dropdownBankBtn .selected-content');
            const hiddenInput = document.getElementById('selectedBankValue');
            dropdownItems.forEach(item => {
                item.addEventListener('click', function (e) {
                    e.preventDefault(); // Empêche le lien de recharger la page
                    // Récupérer le contenu de l'item cliqué (image + texte)
                    const content = this.innerHTML;
                    const value = this.getAttribute('data-value');

                    // Mettre à jour l'affichage du bouton
                    displayElement.innerHTML = content;

                    // Mettre à jour l'input caché avec le nom de la banque
                    if (hiddenInput) {
                        hiddenInput.value = value;
                    }

                    console.log("Banque sélectionnée :", value);
                });
            });

            // Gestion du bouton Continuer
            const btnContinue = document.getElementById('btnContinue');
            if (btnContinue) {
                btnContinue.addEventListener('click', function() {
                    // Récupérer les valeurs du formulaire
                    const amount = document.getElementById('amountInput').value.replace('€', '').trim();
                    const message = document.getElementById('messageInput').value;
                    const bankName = document.getElementById('selectedBankValue') ? 
                        document.getElementById('selectedBankValue').value : '';
                    const accountNumber = document.querySelector('input[type="text"][class*="form-control"]').value;
                    const accountName = document.querySelectorAll('input[type="text"][class*="form-control"]')[1].value;
                    
                    // Valider le montant
                    if (!amount || amount === '0') {
                        alert('Veuillez entrer un montant');
                        return;
                    }

                    // Stocker les données dans sessionStorage
                    const transferData = {
                        type: 'bank_transfer',
                        amount: amount,
                        message: message,
                        bankName: bankName,
                        recipientName: accountName,
                        recipientIdentifier: accountNumber,
                        fromMethod: 'wallet',
                        timestamp: new Date().toISOString()
                    };

                    sessionStorage.setItem('transferData', JSON.stringify(transferData));
                    console.log('Bank transfer data stored:', transferData);

                    // Naviguer vers paymentsource
                    window.location.href = './paymentsource.html';
                });
            }
        });

        // Script pour la selection du montant
        document.addEventListener("DOMContentLoaded", function () {
            const amountInput = document.getElementById('amountInput');
            const amountButtons = document.querySelectorAll('.amount-btn');

            amountButtons.forEach(button => {
                button.addEventListener('click', function () {
                    // Récupérer le montant du bouton cliqué
                    const selectedAmount = this.textContent;

                    // Mettre à jour la valeur de l'input
                    amountInput.value = selectedAmount;

                    //  Gérer l'état visuel "actif"
                    // On retire la classe active de tous les boutons
                    amountButtons.forEach(btn => btn.classList.remove('active'));
                    // On l'ajoute au bouton cliqué
                    this.classList.add('active');
                });
            });
        });

        // script la section message et checkbox
        document.addEventListener("DOMContentLoaded", function () {
            // On cible le bouton qui déclenche la suite du processus (votre bouton "Confirmer")
            const btnToOTP = document.getElementById("btnToOTP");

            if (btnToOTP) {
                btnToOTP.addEventListener("click", function () {
                    // 1. Récupérer le message
                    const message = document.getElementById("messageInput").value;

                    // 2. Vérifier si la case est cochée (true ou false)
                    const isSaved = document.getElementById("saveAccountCheck").checked;

                    // 3. Exemple d'utilisation (Log en console)
                    console.log("Message de transfert :", message);
                    console.log("Enregistrer le compte :", isSaved ? "Oui" : "Non");

                    // stocker ces variables ou les envoyer à au serveur
                });
            }

            // Effacer le message par défaut au premier clic pour aider l'utilisateur
            const messageInput = document.getElementById("messageInput");
            messageInput.addEventListener("focus", function () {
                if (this.value === "Loan payment") {
                    this.value = "";
                }
            });
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Compte Bancaire - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />

</head>

<body>
    <!-- Header -->
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-bank text-primary" style="font-size: 15px;"></span>
                        Compte Bancaire
                    </li>
                </ol>
            </nav>
        </div>

        <div class="container-fluid">
            <p class="mb-2">Détails de mon Compte</p>
            <div class="card rounded-3 shadow-sm mb-2 bg-light-subtle">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">Solde Actuel</p>
<p class="fw-bold text-primary mb-2 fs-5" id="currentBalance">€0,00</p>
                    <p class="mb-0 fs-6" id="bankShortName">--</p>
                    <small class="text-muted">Titulaire du Compte</small>
                </div>
            </div>

            <div class="card mb-4">
                <ul class="list-group list-group-flush rounded-3 shadow-sm">
                    <li class="list-group-item d-flex justify-content-between">
                        <span><i class="bi bi-credit-card-fill me-2"></i>IBAN</span>
<span class="fw-semibold text-break" id="ibanValue">FR76 xxxx xxxx xxxx xxxx</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <span><i class="bi bi-bank me-2"></i>BIC/SWIFT</span>
                        <span class="fw-semibold" id="bicValue">BUDGETAPPXX</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <span><i class="bi bi-person me-2"></i>Nom Complet</span>
<span class="fw-semibold" id="fullNameValue">THEMESFLAT DUPONT</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <span><i class="bi bi-geo-alt me-2"></i>Banque</span>
                        <span class="fw-semibold" id="bankNameValue">Budget Banque Digitale</span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="text-center">
            <button class="btn btn-primary btn-copy-iban" id="btnCopyIban" style="border-radius: 12px;">
                <i class="bi bi-clipboard me-2"></i> Copier l'IBAN
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const copyBtn = document.querySelector('.btn-copy-iban');
            let currentIban = '';

            // Fonction pour charger les données bancaires
            async function loadBankData() {
                try {
                    const profile = await window.api.getProfile();
                    if (profile && profile.success === false) {
                        window.UI.showNotification('Session expirée. Redirection...', 'warning');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                        return;
                    }

                    // Populate data
                    document.getElementById('currentBalance').textContent = window.UI.formatCurrency(profile.balance || 0);
                    document.getElementById('bankShortName').textContent = profile.bank_name || '--';
                    document.getElementById('ibanValue').textContent = profile.iban || '--';
                    document.getElementById('bicValue').textContent = profile.bic_swift || '--';
                    document.getElementById('fullNameValue').textContent = profile.fullName || '--';
                    document.getElementById('bankNameValue').textContent = profile.bank_name || '--';

                    currentIban = profile.iban || '';
                } catch (error) {
                    console.error('Erreur chargement profil:', error);
                    window.UI.showNotification('Erreur chargement données bancaires', 'error');
                }
            }

            // Load data on start
            await loadBankData();

            // Copy IBAN handler
            if (copyBtn) {
                copyBtn.addEventListener('click', function () {
                    if (!currentIban) {
                        window.UI.showNotification('IBAN non disponible', 'warning');
                        return;
                    }
                    navigator.clipboard.writeText(currentIban.replace(/\\s/g, '')).then(() => {
                        const originalContent = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="bi bi-check2 me-2"></i> Copié !';
                        copyBtn.style.backgroundColor = '#198754';
                        setTimeout(() => {
                            copyBtn.innerHTML = originalContent;
                            copyBtn.style.backgroundColor = '';
                        }, 2000);
                    }).catch(err => {
                        console.error('Erreur copie:', err);
                        window.UI.showNotification('Erreur copie IBAN', 'error');
                    });
                });
            }
        });
    </script>
    <script src="../public/js/api.js"></script>
</body>

</html>

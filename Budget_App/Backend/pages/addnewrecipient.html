<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />

</head>

<body>
    <div class="container py-4 bg-white" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-link text-dark text-decoration-none fw-medium p-0">Annuler</button>
            <a href="./detailcontact.html"><button class="btn btn-link text-primary text-decoration-none fw-bold p-0"
                    style="color: #6366f1 !important;">Valider</button></a>
        </div>

        <div class="text-center mb-5">
            <div class="position-relative d-inline-block">
                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center"
                    style="width: 120px; height: 120px;">
                    <i class="bi bi-person-fill text-secondary" style="font-size: 80px;"></i>
                </div>
                <div class="position-absolute bottom-0 end-0 bg-dark rounded-circle d-flex align-items-center justify-content-center border border-white border-2"
                    style="width: 32px; height: 32px;">
                    <i class="bi bi-camera-fill text-white small"></i>
                </div>
            </div>
        </div>

        <form class="form-group" id="add-recipient-form">
            <div class="form-floating mb-3">
                <input type="text" class="form-control shadow-none border" id="recipientName" placeholder="Nom du destinataire" required>
                <label for="recipientName">Nom du destinataire</label>
            </div>

            <div class="form-floating mb-3">
                 <select class="form-select" id="recipientType">
                    <option value="bank" selected>Compte Bancaire</option>
                    <option value="phone">Téléphone</option>
                </select>
                <label for="recipientType">Type de contact</label>
            </div>

            <div class="form-floating mb-3 position-relative">
                <input type="text" class="form-control shadow-none border" id="recipientIdentifier" placeholder="Numéro de compte" required>
                <label for="recipientIdentifier" id="identifierLabel">Numéro de compte</label>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const recipientTypeSelect = document.getElementById('recipientType');
            const identifierInput = document.getElementById('recipientIdentifier');
            const identifierLabel = document.getElementById('identifierLabel');
            const validateButton = document.querySelector('.btn-link.text-primary');

            // Mettre à jour le libellé en fonction du type sélectionné
            recipientTypeSelect.addEventListener('change', function() {
                if (this.value === 'bank') {
                    identifierLabel.textContent = 'Numéro de compte (IBAN)';
                    identifierInput.placeholder = 'Numéro de compte (IBAN)';
                } else {
                    identifierLabel.textContent = 'Numéro de téléphone';
                    identifierInput.placeholder = 'Numéro de téléphone';
                }
            });

            // Gérer la soumission du formulaire
            validateButton.addEventListener('click', function(e) {
                e.preventDefault();

                const recipientData = {
                    name: document.getElementById('recipientName').value,
                    type: recipientTypeSelect.value,
                    identifier: identifierInput.value
                };

                if (!recipientData.name || !recipientData.identifier) {
                    alert('Veuillez remplir tous les champs.');
                    return;
                }

                fetch('/api/recipients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(recipientData)
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = 'mycontact.html';
                    } else {
                        return response.json().then(err => { throw new Error(err.message || 'Une erreur est survenue'); });
                    }
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    alert('Erreur lors de l\'ajout du bénéficiaire: ' + error.message);
                });
            });

            // Annuler
            const cancelButton = document.querySelector('.btn-link.text-dark');
            cancelButton.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'mycontact.html';
            })
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer Friend - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />
</head>

<body>
    <div class="container">
        <div class="breadcrumb mt-3 d-flex justify-content-between">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="./transfert.html">Transfert</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-phone text-primary" style="font-size: 15px;"></span>
                        Mes contacts
                    </li>
                </ol>
            </nav>
            <a href="addnewrecipient.html"><i class="bi bi-plus fs-4 text-dark"></i></a>
        </div>

        <div class="container-fluid mb-2">
            <div class="p-3 rounded-3 bg-secondary-subtle">
                <div class="input-group align-items-center rounded-3 px-2">
                    <span class="bg-transparent border-0 pe-2" id="searchicon">
                        <i class="bi bi-search text-muted fs-6"></i>
                    </span>
                    <input type="text" class="form-control border-0 shadow-none fs-6 rounded-2" id="searchInput"
                        placeholder="Rechercher un destinataire" style="height: 45px;" />
                    <button class="btn border-0 p-2" type="button" id="clearSearch">
                        <i class="bi bi-x-circle-fill text-muted fs-6" role="clear-button"
                            aria-label="Clear Search"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Tableau -->
        <ul class="nav nav-tabs nav-fill mb-3" id="recipientTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="phone-tab" data-bs-toggle="tab" data-bs-target="#phone"
                    type="button" role="tab" aria-controls="phone" aria-selected="true">
                    <!-- aria pour une meilleure accessibilité -->
                    Téléphone
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="bank-tab" data-bs-toggle="tab" data-bs-target="#bank" type="button"
                    role="tab" aria-controls="bank" aria-selected="false">
                    Compte bancaire
                </button>
            </li>
        </ul>
        <!-- Tableau contenu -->
        <div class="tab-content px-3" id="recipientTabsContent">
            <!-- Tableau téléphone -->
            <div class="tab-pane fade show active" id="phone" role="tabpanel">
                <!-- Les contacts téléphoniques seront injectés ici -->
            </div>
            <!-- Tableau des comptes bancaires -->
            <div class="tab-pane fade" id="bank" role="tabpanel">
                <!-- Les contacts bancaires seront injectés ici -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allRecipients = {
            phone: [],
            bank: []
        };

        document.addEventListener('DOMContentLoaded', function() {
            const phoneContainer = document.getElementById('phone');
            const bankContainer = document.getElementById('bank');
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearch');

            fetch('/api/recipients')
                .then(response => response.json())
                .then(recipients => {
                    phoneContainer.innerHTML = ''; // Vider le contenu statique
                    bankContainer.innerHTML = '';  // Vider le contenu statique

                    if (recipients.length === 0) {
                        phoneContainer.innerHTML = '<p class="text-center text-muted">Aucun contact téléphonique.</p>';
                        bankContainer.innerHTML = '<p class="text-center text-muted">Aucun compte bancaire enregistré.</p>';
                        return;
                    }

                    // Stocker les destinataires par type
                    allRecipients.phone = recipients.filter(r => r.type === 'phone');
                    allRecipients.bank = recipients.filter(r => r.type === 'bank');

                    // Afficher tous les contacts initialement
                    displayRecipients(allRecipients.phone, allRecipients.bank);
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    phoneContainer.innerHTML = '<p class="text-center text-danger">Impossible de charger les contacts.</p>';
                    bankContainer.innerHTML = '<p class="text-center text-danger">Impossible de charger les contacts.</p>';
                });

            // Fonction pour afficher les contacts
            function displayRecipients(phoneRecipients, bankRecipients) {
                // Afficher les contacts téléphone
                if (phoneRecipients.length === 0) {
                    phoneContainer.innerHTML = '<p class="text-center text-muted">Aucun contact téléphonique.</p>';
                } else {
                    phoneContainer.innerHTML = phoneRecipients.map(recipient => `
                        <div class="contact-item d-flex align-items-center mb-3">
                            <img src="../public/assets/images/profil.jpg" alt="${recipient.name}" class="img-fluid rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;" />
                            <div>
                                <a href="./detailcontact.html?id=${recipient.id}">
                                    <strong>${recipient.name}</strong><br />
                                    <small class="text-muted">${recipient.identifier}</small>
                                </a>
                            </div>
                        </div>
                    `).join('');
                }

                // Afficher les contacts bancaire
                if (bankRecipients.length === 0) {
                    bankContainer.innerHTML = '<p class="text-center text-muted">Aucun compte bancaire enregistré.</p>';
                } else {
                    bankContainer.innerHTML = bankRecipients.map(recipient => `
                        <div class="contact-item d-flex align-items-center mb-3">
                            <img src="../public/assets/images/profil.jpg" alt="${recipient.name}" class="img-fluid rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;" />
                            <div>
                                <a href="./detailcontact.html?id=${recipient.id}">
                                    <strong>${recipient.name}</strong><br />
                                    <small class="text-muted">${recipient.identifier}</small>
                                </a>
                            </div>
                        </div>
                    `).join('');
                }
            }

            // Fonction de recherche
            function filterRecipients(searchTerm) {
                const term = searchTerm.toLowerCase().trim();

                if (term === '') {
                    displayRecipients(allRecipients.phone, allRecipients.bank);
                    return;
                }

                const filteredPhone = allRecipients.phone.filter(r =>
                    r.name.toLowerCase().includes(term) ||
                    r.identifier.toLowerCase().includes(term)
                );

                const filteredBank = allRecipients.bank.filter(r =>
                    r.name.toLowerCase().includes(term) ||
                    r.identifier.toLowerCase().includes(term)
                );

                displayRecipients(filteredPhone, filteredBank);
            }

            // Écouter l'input de recherche
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    filterRecipients(this.value);
                });
            }

            // Bouton pour effacer la recherche
            if (clearSearchBtn) {
                clearSearchBtn.addEventListener('click', function() {
                    searchInput.value = '';
                    displayRecipients(allRecipients.phone, allRecipients.bank);
                });
            }
        });
    </script>
</body>

</html>

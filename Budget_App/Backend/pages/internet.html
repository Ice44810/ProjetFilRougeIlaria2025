<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />

</head>

<body>
    <!-- Header -->
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="./bill.html">Factures</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-wifi" style="font-size: 15px;"></span>
                        Opérateur Internet
                    </li>
                </ol>
            </nav>
        </div>

        <div class="text-center py-3 bg-white rounded-4 shadow-sm">
            <div class="bill-icon mb-4">
                <img src="../public/assets/images/verifier.png" alt="approbation icon">
            </div>
            <h3 class="fw-bold text-success">€ 21.5</h3>
            <p class="fs-5 small fw-semibold">Modalités de paiement décembre 2026</p>
            <p class="text-muted">Mise à jour par l'opérateur</p>
        </div><br>
        <p class="fw-bold mb-2">Informations Client</p>
        <div class="text-center bg-white rounded-4 shadow-sm p-3">
            <div class="d-flex justify-content-between">
                <!-- Colonne gauche -->
                <div class="text-start">
                    <p>Code client</p>
                    <p>Nom client</p>
                    <p>Mail</p>
                </div>
                <!-- Colonne droite -->
                <div class="text-end">
                    <p>PD123456789</p>
                    <p>Themesflat</p>
                    <p>themesflat@gmail.com</p>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="./paymentsource.html" class="btn custom-primary-btn fs-4">Paiement Facture</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Stocker les données de la facture internet
            const billData = {
                type: 'bill',
                billType: 'internet',
                amount: '21.5',
                clientCode: 'PD123456789',
                clientName: 'Themesflat',
                clientEmail: 'themesflat@gmail.com',
                period: 'décembre 2026',
                timestamp: new Date().toISOString()
            };
            
            // Stocker dans sessionStorage pour la page paymentsource
            sessionStorage.setItem('billData', JSON.stringify(billData));
            console.log('Internet bill data stored:', billData);
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historique Bancaire - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/public/js/api.js"></script>
    <script src="/public/js/charts.js"></script>
</head>

<body>
    <!-- Header -->
    <div class="container">
        <div class="breadcrumb mt-3 d-flex justify-content-between">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-graph-up text-success" style="font-size: 15px;"></span>
                        Historique Bancaire
                    </li>
                </ol>
            </nav>
            <a href="#" class="text-decoration-none" data-bs-toggle="offcanvas" data-bs-target="#offcanvasFilter"
                aria-controls="offcanvasFilter">
                <i class="bi bi-sliders fs-5"></i>
            </a>
        </div>

        <div class="row g-3 mb-2">
            <div class="col-6">
                <div class="card card-stats p-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-box bg-primary-subtle me-3">
                            <i class="bi bi-arrow-up text-primary fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small text-center">Entrées</div>
                            <div class="fw-bold text-success text-center" id="totalIncome">€0.00</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card card-stats p-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-box bg-danger-subtle me-3">
                            <i class="bi bi-arrow-down text-danger fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Sorties</div>
                            <div class="fw-bold text-danger" id="totalExpense">€0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Tableau -->
        <ul class="nav nav-tabs nav-fill mb-3 d-flex justify-content-center mb-2 mt-2 shadow-sm" id="historyTabs"
            role="tablist">
            <li class="nav-item bg-primary-subtle rounded-3 me-2">
                <button class="nav-link active" id="7days-tab" data-bs-toggle="tab" data-bs-target="#7days"
                    type="button" role="tab" aria-controls="7days" aria-selected="true">
                    <!-- aria pour une meilleure accessibilité -->
                    7 derniers jours </button>
            </li>
            <li class="nav-item bg-primary-subtle rounded-3 me-2">
                <button class="nav-link" id="30days-tab" data-bs-toggle="tab" data-bs-target="#30days" type="button"
                    role="tab" aria-controls="30days" aria-selected="false">30 derniers jours </button>
            </li>
            <li class="nav-item bg-primary-subtle rounded-3">
                <button class="nav-link" id="custom-tab" data-bs-toggle="tab" data-bs-target="#custom" type="button"
                    role="tab" aria-controls="custom" aria-selected="false">Personnaliser </button>
            </li>
        </ul>
        <div class="tab-content px-3" id="historyTabsContent">
            <!-- Tableau téléphone -->
            <div class="tab-pane fade show active" id="7days" role="tabpanel">
                <div class="mb-3 px-2 p-3">
                    <div class="chart-container d-flex">
                        <div class="y-axis fs-6 small d-flex flex-column justify-content-between"
                            style="width: 50px; min-width: 50px; min-height: 230px; max-height: 230px; padding-bottom: 30px;">
                            <span>400</span>
                            <span>200</span>
                            <span>0</span>
                            <span>-200</span>
                            <span>-400</span>
                        </div>
                        <div class="chart-content flex-grow-1 position-relative">
                            <div class="grid-lines position-absolute w-100 h-100">
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                            </div>
                            <div class="d-flex justify-content-around align-items-center position-relative gap-4"
                                style="height: 230px;">
                                <div class="bar up bg-success" style="height: 80px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 80px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 110px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 60px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 90px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 70px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 40px; width: 30px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small mt-2" style="margin-left: 50px;">
                        <span>29-06</span>
                        <span>05-07</span>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="30days" role="tabpanel">
                <div class="mb-3 px-2 p-3">
                    <div class="chart-container d-flex">
                        <div class="y-axis fs-6 small d-flex flex-column justify-content-between"
                            style="width: 50px; min-width: 50px; min-height: 230px; max-height: 230px; padding-bottom: 30px;">
                            <span>400</span>
                            <span>200</span>
                            <span>0</span>
                            <span>-200</span>
                            <span>-400</span>
                        </div>
                        <div class="chart-content flex-grow-1 position-relative">
                            <div class="grid-lines position-absolute w-100 h-100">
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                            </div>
                            <div class="d-flex justify-content-around align-items-center position-relative gap-4"
                                style="height: 230px;">
                                <div class="bar up bg-success" style="height: 80px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 80px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 110px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 60px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 90px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 70px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 40px; width: 30px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small mt-2" style="margin-left: 50px;">
                        <span>29-06</span>
                        <span>05-07</span>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="custom" role="tabpanel">
                <div class="mb-3 px-2 p-3">
                    <div class="chart-container d-flex">
                        <div class="y-axis fs-6 small d-flex flex-column justify-content-between"
                            style="width: 50px; min-width: 50px; min-height: 230px; max-height: 230px; padding-bottom: 30px;">
                            <span>400</span>
                            <span>200</span>
                            <span>0</span>
                            <span>-200</span>
                            <span>-400</span>
                        </div>
                        <div class="chart-content flex-grow-1 position-relative">
                            <div class="grid-lines position-absolute w-100 h-100">
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                                <div class="line border-bottom" style="height: 25%;"></div>
                            </div>
                            <div class="d-flex justify-content-around align-items-center position-relative gap-4"
                                style="height: 230px;">
                                <div class="bar up bg-success" style="height: 80px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 80px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 110px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 60px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 90px; width: 30px;"></div>
                                <div class="bar up bg-success" style="height: 70px; width: 30px;"></div>
                                <div class="bar down bg-danger" style="height: 40px; width: 30px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small mt-2" style="margin-left: 50px;">
                        <span>29-06</span>
                        <span>05-07</span>
                    </div>
                </div>
            </div>
        </div>
        <div id="transactionsListContainer" class="container-fluid mb-5 mt-2">
            <!-- Les transactions seront chargées ici dynamiquement -->
            <div class="text-center text-muted py-4">Chargement des transactions...</div>
        </div>
    </div>
    <!-- Modal Filtre -->
    <div class="offcanvas offcanvas-start border-0" tabindex="-1" id="offcanvasFilter"
        aria-labelledby="offcanvasFilterLabel" style="width: 65%;">
        <div class="offcanvas-header border-bottom"><button type="button" class="btn border-0 p-0"
                data-bs-dismiss="offcanvas" aria-label="Close"><i class="bi bi-chevron-left fs-6"></i></button>
            <h6 class="offcanvas-title fw-bold m-auto" id="offcanvasFilterLabel">Filtre</h6>
            <div style="width: 24px;"></div>
        </div>
        <div class="offcanvas-body p-4">
            <p class="fw-bold mb-3">Mensuel</p>
            <div class="row g-2 mb-4">
                <div class="col-4"><button class="btn btn-filter active w-100">Tout</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Jan</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Fev</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Mar</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Avr</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Mai</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Jun</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Juil</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Aou</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Sep</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Oct</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Nov</button></div>
                <div class="col-4"><button class="btn btn-filter w-100">Dec</button></div>
                <p class="fw-bold mb-3">Statut</p>
                <div class="row g-2 mb-5">
                    <div class="col-6"><button class="btn btn-filter active w-100">Tout</button></div>
                    <div class="col-6"><button class="btn btn-filter w-100">Réussi</button></div>
                    <div class="col-6"><button class="btn btn-filter w-100">En cours</button></div>
                    <div class="col-6"><button class="btn btn-filter w-100">Échoué</button></div>
                </div>
                <div class="mt-auto pt-4">
                    <a href="./bankhistory.html">
                        <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm"
                            style="border-radius: 12px;">Appliquer</button>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer py-2">
        <div class="d-flex justify-content-around align-items-center">
            <a href="./index.html" class="footer-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Accueil</span>
            </a>
            <a href="./bankhistory.html" class="active-link">
                <i class="bi bi-clock-history"></i>
                <span>Historique</span>
            </a>
            <a href="./myqr.html" class="footer-link">
                <i class="bi bi-qr-code-scan"></i>
                <span>QR</span>
            </a>
            <a href="./rewards.html" class="footer-link">
                <i class="bi bi-gift"></i>
                <span>Récompenses</span>
            </a>
            <a href="./Profile.html" class="footer-link">
                <i class="bi bi-person"></i>
                <span>Profil</span>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/bankhistory.js"></script>
</body>

</html>

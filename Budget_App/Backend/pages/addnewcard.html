<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajout carte bancaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../public/assets/style.css" />
</head>
<body>
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="card.html">Carte Bancaire</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Ajouter une carte</li>
                </ol>
            </nav>
        </div>

        <p class="fw-semibold mb-4 ms-3 mt-1">Ajouter les informations de la carte bancaire</p>
        
        <form id="addCardForm" class="form-group">
            <div class="form-floating" id="cardform">
                <div class="mb-4 position-relative">
                    <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -12px; left: 0; z-index: 5; background: white;">Numéro carte</label>
                    <div class="input-group border rounded-3 align-items-center px-3" style="height: 40px;">
                        <input type="text" name="card_number" id="card-number" class="form-control border-0 bg-transparent fs-6" placeholder="0000 0000 0000 0000" style="box-shadow: none;">
                        <i class="bi bi-credit-card-fill text-primary fs-5"></i>
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -12px; left: 0; z-index: 5; background: white;">Nom du titulaire</label>
                    <div class="border rounded-3 px-3 d-flex align-items-center" style="height: 40px;">
                        <input type="text" name="card_holder" id="card-holder" class="form-control border-0 bg-transparent fs-6" placeholder="Ex: Jean Dupont" style="box-shadow: none;">
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-6">
                        <div class="position-relative">
                            <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -12px; left: 0; z-index: 5; background: white;">Expiration</label>
                            <div class="input-group border rounded-3 align-items-center px-3" style="height: 40px;">
                                <input type="month" id="expiry-date" class="form-control border-0 bg-transparent text-muted" style="box-shadow: none">
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="position-relative">
                            <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -12px; left: 0; z-index: 5; background: white;">CVV</label>
                            <div class="input-group border rounded-3 align-items-center px-3" style="height: 40px;">
                                <input type="text" id="card-cvv" maxlength="3" class="form-control border-0 bg-transparent text-muted" placeholder="123" style="box-shadow: none;">
                                <i class="bi bi-info-circle text-secondary fs-6"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex justify-content-end">
                <button type="submit" class="btn btn-primary rounded-3" id="btnToOTP">Continuer</button>
            </div>
        </form>
    </div>

    <div class="modal fade" id="loadingModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 bg-transparent text-center">
                <div class="spinner-border text-white mb-3" style="width: 3rem; height: 3rem;"></div>
                <p class="text-white fw-bold">Traitement en cours...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 p-4 text-center">
                <div class="bg-success rounded-circle d-inline-flex p-3 mb-3 text-white mx-auto">
                    <i class="bi bi-check-lg fs-1"></i>
                </div>
                <h4 class="fw-bold">Succès !</h4>
                <p class="text-muted">Votre carte a été enregistrée.</p>
                <button class="btn btn-primary w-100 py-2 mt-3" id="btnDone">Terminer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const modalLoading = new bootstrap.Modal(document.getElementById('loadingModal'));
            const modalSuccess = new bootstrap.Modal(document.getElementById('successModal'));
            const form = document.getElementById('addCardForm');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                // 1. Récupération & Nettoyage des données
                const cardNumber = document.getElementById('card-number').value.replace(/\s/g, ''); // Correction REGEX
                const cardHolder = document.getElementById('card-holder').value.trim();
                const expiryDate = document.getElementById('expiry-date').value;
                const cvv = document.getElementById('card-cvv').value.trim(); // Correction ID

                // 2. Validation simple côté client
                if (cardNumber.length < 13 || isNaN(cardNumber)) {
                    alert('Numéro de carte invalide');
                    return;
                }
                if (!cardHolder || !expiryDate || cvv.length !== 3) {
                    alert('Veuillez remplir tous les champs correctement');
                    return;
                }

                // 3. Déduction de la marque et formatage pour la Base de données
                let brand = 'Autre';
                if (cardNumber.startsWith('4')) brand = 'Visa';
                else if (cardNumber.startsWith('5')) brand = 'Mastercard';
                
                const last4 = cardNumber.slice(-4);
                
                // Convertir la date de "YYYY-MM" vers "MM/YY" (attendu par cardinfo et card)
                const [year, month] = expiryDate.split('-');
                const formattedExpiry = `${month}/${year.slice(-2)}`;

                const cardData = {
                    // Format potentiellement attendu par votre API backend (camelCase)
                    cardNumber: cardNumber,
                    cardHolderName: cardHolder,
                    expiryDate: expiryDate,
                    cvv: cvv,
                    
                    // Format pour la base de données (snake_case)
                    card_holder_name: cardHolder,
                    last_4_digits: last4,
                    expiry_date: formattedExpiry,
                    card_brand: brand
                };

                modalLoading.show();

                // 4. Appel API (Correspond au handleCards.js)
                fetch('/api/cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cardData)
                })
                .then(async response => {
                    modalLoading.hide();
                    const data = await response.json();
                    
                    if (response.ok) {
                        modalSuccess.show();
                    } else {
                        alert('Erreur : ' + (data.message || data.error));
                    }
                })
                .catch(err => {
                    modalLoading.hide();
                    alert('Erreur réseau ou serveur');
                });
            });

            document.getElementById('btnDone').addEventListener('click', () => {
                window.location.href = 'card.html';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistiques - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="/public/js/api.js"></script>
    <script src="/public/js/charts.js"></script>
</head>

<body>
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-bar-chart text-primary" style="font-size: 15px;"></span>
                        Statistiques
                    </li>
                </ol>
            </nav>
        </div>

        <h4 class="mb-4">Aperçu financier</h4>

        <!-- Statistiques globales -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Solde Total</p>
                    <h4 class="text-primary mb-0" id="totalBalance">--</h4>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Total Revenus</p>
                    <h4 class="text-success mb-0" id="totalIncome">--</h4>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Total Dépenses</p>
                    <h4 class="text-danger mb-0" id="totalExpense">--</h4>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Taux d'épargne</p>
                    <h4 class="text-warning mb-0" id="savingsRate">--</h4>
                </div>
            </div>
        </div>

        <!-- Graphique évolution mensuelle -->
        <div class="card p-4 rounded-4 border shadow-sm mb-4">
            <h5 class="fw-semibold mb-3">Évolution mensuelle</h5>
            <canvas id="evolutionChart" height="250"></canvas>
        </div>

        <!-- Graphiques secteurs -->
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card p-4 rounded-4 border shadow-sm">
                    <h5 class="fw-semibold mb-3">Dépenses par catégorie</h5>
                    <canvas id="expensesPieChart" height="250"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 rounded-4 border shadow-sm">
                    <h5 class="fw-semibold mb-3">Revenus par catégorie</h5>
                    <canvas id="incomePieChart" height="250"></canvas>
                </div>
            </div>
        </div>

        <!-- Graphique comparaison -->
        <div class="card p-4 rounded-4 border shadow-sm mb-4">
            <h5 class="fw-semibold mb-3">Revenus vs Dépenses</h5>
            <canvas id="comparisonChart" height="150"></canvas>
        </div>

        <!-- Top transactions -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-4 rounded-4 border shadow-sm">
                    <h5 class="fw-semibold mb-3">Plus grandes dépenses</h5>
                    <div id="topExpenses">
                        <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-danger" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 rounded-4 border shadow-sm">
                    <h5 class="fw-semibold mb-3">Plus grands revenus</h5>
                    <div id="topIncome">
                        <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer py-2">
        <div class="d-flex justify-content-around align-items-center">
            <a href="./index.html" class="footer-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Accueil</span>
            </a>
            <a href="./transactions.html" class="footer-link">
                <i class="bi bi-clock-history"></i>
                <span>Historique</span>
            </a>
            <a href="./myqr.html" class="footer-link">
                <i class="bi bi-qr-code-scan"></i>
                <span>QR</span>
            </a>
            <a href="./rewards.html" class="footer-link">
                <i class="bi bi-gift"></i>
                <span>Récompenses</span>
            </a>
            <a href="./profile.html" class="footer-link">
                <i class="bi bi-person"></i>
                <span>Profil</span>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let evolutionChart = null;
        let expensesPieChart = null;
        let incomePieChart = null;
        let comparisonChart = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadOverallStats();
            await loadCharts();
            await loadTopTransactions();
        });

        async function loadOverallStats() {
            try {
                const stats = await api.getStats();
                
                document.getElementById('totalBalance').textContent = UI.formatCurrency(stats.balance);
                document.getElementById('totalIncome').textContent = UI.formatCurrency(stats.totalIncome);
                document.getElementById('totalExpense').textContent = UI.formatCurrency(stats.totalExpense);
                document.getElementById('savingsRate').textContent = stats.savingsRate + '%';
            } catch (error) {
                console.error('Erreur chargement stats:', error);
            }
        }

        async function loadCharts() {
            try {
                // Graphique évolution mensuelle
                const lineData = await api.getLineChartData();
                const ctxEvolution = document.getElementById('evolutionChart').getContext('2d');
                
                if (evolutionChart) evolutionChart.destroy();
                evolutionChart = new Chart(ctxEvolution, {
                    type: 'line',
                    data: lineData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value + ' €';
                                    }
                                }
                            }
                        }
                    }
                });

                // Graphique dépenses
                const expenseData = await api.getPieChartData('expense');
                const ctxExpenses = document.getElementById('expensesPieChart').getContext('2d');
                
                if (expensesPieChart) expensesPieChart.destroy();
                expensesPieChart = new Chart(ctxExpenses, {
                    type: 'doughnut',
                    data: expenseData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });

                // Graphique revenus
                const incomeData = await api.getPieChartData('income');
                const ctxIncome = document.getElementById('incomePieChart').getContext('2d');
                
                if (incomePieChart) incomePieChart.destroy();
                incomePieChart = new Chart(ctxIncome, {
                    type: 'doughnut',
                    data: incomeData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });

                // Graphique comparaison
                const monthlyData = await api.getMonthlyEvolution(6);
                const ctxComparison = document.getElementById('comparisonChart').getContext('2d');
                
                if (comparisonChart) comparisonChart.destroy();
                comparisonChart = new Chart(ctxComparison, {
                    type: 'bar',
                    data: {
                        labels: monthlyData.map(stat => stat.month_name),
                        datasets: [
                            {
                                label: 'Revenus',
                                data: monthlyData.map(stat => parseFloat(stat.income)),
                                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                                borderColor: 'rgba(75, 192, 192, 1)',
                                borderWidth: 2
                            },
                            {
                                label: 'Dépenses',
                                data: monthlyData.map(stat => parseFloat(stat.expense)),
                                backgroundColor: 'rgba(255, 99, 132, 0.5)',
                                borderColor: 'rgba(255, 99, 132, 1)',
                                borderWidth: 2
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value + ' €';
                                    }
                                }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Erreur chargement graphiques:', error);
            }
        }

        async function loadTopTransactions() {
            try {
                // Top dépenses
                const expenseStats = await api.getCategoryStats('expense', 'month');
                const topExpensesContainer = document.getElementById('topExpenses');
                
                if (expenseStats.length === 0) {
                    topExpensesContainer.innerHTML = '<p class="text-muted">Aucune dépense</p>';
                } else {
                    topExpensesContainer.innerHTML = expenseStats.slice(0, 5).map(stat => `
                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                            <span>${stat.category_name}</span>
                            <span class="text-danger fw-bold">${UI.formatCurrency(stat.total)}</span>
                        </div>
                    `).join('');
                }

                // Top revenus
                const incomeStats = await api.getCategoryStats('income', 'month');
                const topIncomeContainer = document.getElementById('topIncome');
                
                if (incomeStats.length === 0) {
                    topIncomeContainer.innerHTML = '<p class="text-muted">Aucun revenu</p>';
                } else {
                    topIncomeContainer.innerHTML = incomeStats.slice(0, 5).map(stat => `
                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                            <span>${stat.category_name}</span>
                            <span class="text-success fw-bold">${UI.formatCurrency(stat.total)}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Erreur chargement top transactions:', error);
            }
        }
    </script>
</body>

</html>

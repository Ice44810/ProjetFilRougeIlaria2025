<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="/public/js/api.js"></script>
</head>

<body>
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-person-fill text-black" style="font-size: 15px;"></span>
                        Profil
                    </li>
                </ol>
            </nav>
        </div>

        <!-- En-tête du profil -->
        <div class="profile-header d-flex align-items-center justify-content-between p-3 my-1 bg-white rounded-4 shadow-sm">
            <div class="d-flex align-items-center">
                <img src="../public/assets/images/profil.jpg" alt="Profil" class="rounded-circle profile-img me-3" style="width: 60px; height: 60px;" id="userAvatar">
                <div>
                    <h5 class="mb-0 fw-bold" id="userName">Chargement...</h5>
                    <p class="text-muted small mb-0" id="userEmail">--</p>
                    <p class="cardNumber">
                        <span class="text-muted small">ID: <span id="userId">--</span></span>
                    </p>
                </div>
            </div>
            <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                <i class="bi bi-pencil"></i> Modifier
            </button>
        </div>

        <!-- Statistiques -->
        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Solde</p>
                    <h5 class="text-primary mb-0" id="userBalance">--</h5>
                </div>
            </div>
            <div class="col-4">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Transactions</p>
                    <h5 class="text-success mb-0" id="transactionCount">--</h5>
                </div>
            </div>
            <div class="col-4">
                <div class="card rounded-4 border shadow-sm text-center p-3">
                    <p class="text-muted mb-1 small">Rôle</p>
                    <h5 class="text-info mb-0" id="userRole">--</h5>
                </div>
            </div>
        </div>

        <!-- Menu Profil -->
        <div class="list-group list-group-flush">
            <a href="./myqr.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-primary-subtle text-primary"><i class="bi bi-qr-code-scan"></i></div>
                    <span>QR code transfert</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>

            <a href="./bankhistory.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-warning-subtle text-warning"><i class="bi bi-cash"></i></div>
                    <span>Balance Compte</span>
                </div>
                <div class="d-flex align-items-center">
                    <span class="me-3 fw-bold" id="balanceDisplay">--</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </div>
            </a>

            <a href="./changepw.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-secondary-subtle text-secondary"><i class="bi bi-key"></i></div>
                    <span>Changer le mot de passe</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>

            <a href="./security_center.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-info-subtle text-info"><i class="bi bi-shield-check"></i></div>
                    <span>Centre de sécurité</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>

            <a href="./setting.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-dark-subtle text-dark"><i class="bi bi-gear-fill"></i></div>
                    <span>Paramètres</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>

            <a href="/logout" class="list-group-item d-flex align-items-center justify-content-between py-3 text-danger">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-danger-subtle text-danger"><i class="bi bi-box-arrow-right"></i></div>
                    <span>Déconnexion</span>
                </div>
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>

    <!-- Modal Modifier Profil -->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProfileModalLabel">Modifier le Profil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editProfileForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="profileEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nom complet</label>
                            <input type="text" class="form-control" id="profileFullName" placeholder="Votre nom complet">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Téléphone</label>
                            <input type="tel" class="form-control" id="profilePhone" placeholder="Votre numéro de téléphone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Adresse</label>
                            <input type="text" class="form-control" id="profileAddress" placeholder="Votre adresse">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Code postal</label>
                                <input type="text" class="form-control" id="profilePostcode" placeholder="Code postal">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Ville</label>
                                <input type="text" class="form-control" id="profileVille" placeholder="Ville">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer py-2">
        <div class="d-flex justify-content-around align-items-center">
            <a href="./index.html" class="footer-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Accueil</span>
            </a>
            <a href="./transactions.html" class="footer-link">
                <i class="bi bi-clock-history"></i>
                <span>Historique</span>
            </a>
            <a href="./myqr.html" class="footer-link">
                <i class="bi bi-qr-code-scan"></i>
                <span>QR</span>
            </a>
            <a href="./rewards.html" class="footer-link">
                <i class="bi bi-gift"></i>
                <span>Récompenses</span>
            </a>
            <a href="./Profile.html" class="active-link">
                <i class="bi bi-person"></i>
                <span>Profil</span>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            await loadStats();
            setupForm();
        });

        async function loadProfile() {
            try {
                const profile = await api.getProfile();
                
                if (profile) {
                    document.getElementById('userName').textContent = profile.fullName || profile.email.split('@')[0];
                    document.getElementById('userEmail').textContent = profile.email;
                    document.getElementById('userId').textContent = profile.id;
                    document.getElementById('userRole').textContent = profile.role === 'admin' ? 'Administrateur' : 'Utilisateur';

                    // Remplir le formulaire
                    document.getElementById('profileEmail').value = profile.email || '';
                    document.getElementById('profileFullName').value = profile.fullName || '';
                    document.getElementById('profilePhone').value = profile.phone || '';
                    document.getElementById('profileAddress').value = profile.address || '';
                    document.getElementById('profilePostcode').value = profile.postcode || '';
                    document.getElementById('profileVille').value = profile.ville || '';
                }
            } catch (error) {
                console.error('Erreur chargement profil:', error);
                UI.showNotification('Erreur lors du chargement du profil', 'error');
            }
        }

        async function loadStats() {
            try {
                const stats = await api.getStats();
                
                document.getElementById('userBalance').textContent = UI.formatCurrency(stats.balance);
                document.getElementById('balanceDisplay').textContent = UI.formatCurrency(stats.balance);
                // Stocker le solde dans le localStorage pour le partager
                localStorage.setItem('userBalance', stats.balance);
                document.getElementById('transactionCount').textContent = stats.transactionCount;
            } catch (error) {
                console.error('Erreur chargement stats:', error);
            }
        }

        function setupForm() {
            document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const data = {
                    email: document.getElementById('profileEmail').value,
                    fullName: document.getElementById('profileFullName').value || null,
                    phone: document.getElementById('profilePhone').value || null,
                    address: document.getElementById('profileAddress').value || null,
                    postcode: document.getElementById('profilePostcode').value || null,
                    ville: document.getElementById('profileVille').value || null
                };

                try {
                    const result = await api.updateProfile(data);
                    
                    if (result.success) {
                        UI.showNotification('Profil mis à jour!', 'success');
                        const modal = bootstrap.Modal.getInstance(document.getElementById('editProfileModal'));
                        modal.hide();
                        await loadProfile();
                    } else {
                        UI.showNotification(result.error || 'Erreur lors de la mise à jour', 'error');
                    }
                } catch (error) {
                    console.error('Erreur mise à jour profil:', error);
                    UI.showNotification('Erreur lors de la mise à jour', 'error');
                }
            });
        }
    </script>
</body>

</html>

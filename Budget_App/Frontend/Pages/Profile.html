    <script>
        const cardNumber = document.querySelector(".bi-files");
        cardNumber.addEventListener("click", () => {
            const cardNumber = "0321 0000 2342 2424";
            navigator.clipboard.writeText(cardNumber).then(() => {
                alert("Card number copied to clipboard!");
                console.log("Numéro de carte copié avec succès !");
            });
        });
    </script>

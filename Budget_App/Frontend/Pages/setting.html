<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paramètres - Budget App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Public/Assets/style.css" />
</head>

<body class="bg-body text-body">

    <div class="container">

        <!-- Breadcrumb -->
        <nav class="mt-3" aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
        <li class="breadcrumb-item"><a href="Profile.html">Profil</a></li>
                <li class="breadcrumb-item active">
                    <i class="bi bi-gear-fill me-1"></i> Paramètres
                </li>
            </ol>
        </nav>

        <!-- Settings list -->
        <div class="list-group mb-4">

            <a href="edit_profil.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Modifier le profil</span>
                <i class="bi bi-chevron-right"></i>
            </a>

            <a href="changepw.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Changer le mot de passe</span>
                <i class="bi bi-chevron-right"></i>
            </a>

            <a href="security_center.html"
                class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Centre de sécurité</span>
                <i class="bi bi-chevron-right"></i>
            </a>

            <!-- Biométrie -->
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>Authentification biométrique</span>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" checked>
                </div>
            </div>

            <a href="notification_setting.html"
                class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Notifications</span>
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>

        <!-- Langue -->
        <select class="form-select mb-3">
            <option selected>Langue</option>
            <option>Français</option>
            <option>English</option>
            <option>Deutsch</option>
            <option>Español</option>
            <option>Italiano</option>
        </select>

        <!-- Theme switch -->
        <div class="d-flex justify-content-center align-items-center gap-3 fs-4 mb-4">
            <i class="bi bi-sun-fill text-warning" id="theme-icon-light"></i>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="darkModeSwitch">
            </div>
            <i class="bi bi-moon-stars-fill text-muted" id="theme-icon-dark"></i>
        </div>

        <!-- Logout -->
        <div class="list-group">
            <a class="list-group-item list-group-item-action text-danger text-center" data-bs-toggle="modal"
                data-bs-target="#logoutModal">
                Se déconnecter
            </a>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-body text-body border-0 rounded-4 shadow">
                <div class="modal-body text-center p-4">
                    <p class="fw-semibold mb-3">
                        Voulez-vous vraiment vous déconnecter ?
                    </p>
                    <div class="d-flex justify-content-between gap-2">
                        <button class="btn btn-outline-secondary w-100" data-bs-dismiss="modal">Annuler</button>
                        <a href="login.html" class="btn btn-danger w-100">Déconnecter</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (() => {
            const saved = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute(
                'data-bs-theme',
                saved || (systemDark ? 'dark' : 'light')
            );
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const toggle = document.getElementById('darkModeSwitch');
            const sun = document.getElementById('theme-icon-light');
            const moon = document.getElementById('theme-icon-dark');

            const isDark = html.getAttribute('data-bs-theme') === 'dark';
            toggle.checked = isDark;
            updateIcons(isDark);

            toggle.addEventListener('change', () => {
                const theme = toggle.checked ? 'dark' : 'light';
                html.setAttribute('data-bs-theme', theme);
                localStorage.setItem('theme', theme);
                updateIcons(toggle.checked);
            });

            function updateIcons(dark) {
                sun.className = `bi bi-sun-fill ${dark ? 'text-muted' : 'text-warning'}`;
                moon.className = `bi bi-moon-stars-fill ${dark ? 'text-primary' : 'text-muted'}`;
            }
        });
    </script>

</body>

</html>

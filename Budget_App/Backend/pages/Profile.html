        <!-- En-tête du profil -->

                    <i class="bi bi-files text-primary ms-2" role="button" title="Copier ID" id="copyUserId"></i>

            </div>
        </div>

        <!-- Menu Profil -->

            <a href="./bankhistory.html" class="list-group-item d-flex align-items-center justify-content-between py-3">

            </a>

            <a href="./rewards.html" class="list-group-item d-flex align-items-center justify-content-between py-3">

                        <div class="icon-square me-3 bg-danger-subtle text-danger"><i class="bi bi-gift-fill"></i></div>
                        <span>Mes Cadeaux</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="me-3 fw-bold">21 Cadeaux</span>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                </a>

                <a href="./banque.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-square me-3 bg-info-subtle text-info"><i class="bi bi-bank"></i></div>
                        <span>Banque</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="me-3 text-muted">1 lien</span>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                </a>

                <a href="./bill.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-square me-3 bg-success-subtle text-success"><i
                                class="bi bi-file-earmark-text"></i>
                        </div>
                        <span>Gestion des Factures</span>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>

                <a href="./topup.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-square me-3 bg-secondary-subtle text-secondary"><i
                                class="bi bi-credit-card-2-back"></i></div>
                        <span>Lien Paiement</span>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>

                <a href="./cardinfo.html"
                    class="list-group-item d-flex align-items-center justify-content-between py-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-square me-3 bg-dark-subtle text-dark"><i class="bi bi-credit-card"></i></div>
                        <span>Carte de Crédit</span>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>

                <a href="./mycontact.html"
                    class="list-group-item d-flex align-items-center justify-content-between py-3">
                    <div class="d-flex align-items-center">
                        <div class="icon-square me-3 bg-primary-subtle text-primary"><i class="bi bi-people-fill"></i>
                        </div>
                        <span>Gestion Contacts</span>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>


            <a href="./setting.html" class="list-group-item d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center">
                    <div class="icon-square me-3 bg-dark-subtle text-dark"><i class="bi bi-gear-fill"></i></div>
                    <span>Paramètres</span>

                <i class="bi bi-chevron-right text-muted"></i>

    </div>

    <!-- FOOTER -->
    <footer class="footer py-2">
        <div class="d-flex justify-content-around align-items-center">
            <a href="./index.html" class="footer-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Accueil</span>

            <a href="./transactions.html" class="footer-link">

            <a href="./myqr.html" class="footer-link">
                <i class="bi bi-qr-code-scan"></i>
                <span>QR</span>
            </a>
            <a href="./rewards.html" class="footer-link">
                <i class="bi bi-gift"></i>
                <span>Récompenses</span>
            </a>
            <a href="./Profile.html" class="active-link">
                <i class="bi bi-person"></i>
                <span>Profil</span>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            await loadStats();
        });

        async function loadProfile() {
            try {
                const profile = await api.getProfile();
                
                // Si l'utilisateur n'est pas connecté
                if (!profile || profile.success === false) {
                    UI.showNotification('Veuillez vous connecter', 'warning');
                    setTimeout(() => window.location.href = './login.html', 2000);
                    return;
                }

                // Gérer le cas où les données sont encapsulées (ex: { user: {...} })
                const userData = profile.user || profile.data || profile;

                const nameEl = document.getElementById('userName');
                const idEl = document.getElementById('userId');
                const avatarEl = document.getElementById('userAvatar');
                
                if (userData && nameEl && idEl) {
                    nameEl.textContent = userData.fullName || (userData.email ? userData.email.split('@')[0] : 'Utilisateur');
                    idEl.textContent = userData.id || '--';
                    
                    // Mettre à jour la photo de profil si elle existe
                    if (avatarEl && userData.avatar) {
                        avatarEl.src = userData.avatar;
                    }
                }
            } catch (error) {
                console.error('Erreur chargement profil:', error);
                const idEl = document.getElementById('userId');
                if (idEl) idEl.textContent = '--';
                const nameEl = document.getElementById('userName');
                if (nameEl) nameEl.textContent = 'Utilisateur';
            }
        }

        async function loadStats() {
            try {
                const stats = await api.getStats();
                const balanceEl = document.getElementById('balanceDisplay');
                if (balanceEl && stats && stats.balance !== undefined) {
                    balanceEl.textContent = UI.formatCurrency(stats.balance);
                    localStorage.setItem('userBalance', stats.balance);
                }
            } catch (error) {
                console.error('Erreur chargement stats:', error);
                const balanceEl = document.getElementById('balanceDisplay');
                if (balanceEl) balanceEl.textContent = '--';
            }
        }
    </script>
</body>

</html>

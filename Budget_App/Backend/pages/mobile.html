<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="/public/js/api.js"></script>
</head>

<body>
    <!-- Header -->
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="./bill.html">Factures</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-phone" style="font-size: 15px;"></span>
                        Opérateur Mobile
                    </li>
                </ol>
            </nav>
        </div>
        <!-- Contenu de la facture -->
        <div class="container">
            <div class="text-center py-5 bg-white rounded-4 shadow-sm">
                <div class="bill-icon mb-4">
                    <img src="../public/assets/images/verifier.png" alt="bill icon">
                </div>
                <h3 class="fw-bold text-danger">€70.0</h3>
                <p class="fs-5 fw-semibold">Montant à payer</p>
                <p class="text-muted">Mise à jour par l'opérateur</p>
            </div><br>
            <div class="text-center rounded-4 shadow-sm p-4">
                <p class="fw-bold mb-4">Informations Client</p>
                <div class="d-flex justify-content-between">
                    <!-- Colonne gauche -->
                    <div class="text-start">
                        <p>Code client</p>
                        <p>Nom client</p>
                        <p>Mail</p>
                    </div>
                    <!-- Colonne droite -->
                    <div class="text-end">
                        <p>PD123456789</p>
                        <p id="clientName">Chargement...</p>
                        <p id="clientEmail">Chargement...</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-3 d-flex justify-content-end">
            <a href="./paymentsource.html" class="btn custom-primary-btn fs-6">Paiement Facture</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentBillData = {
            type: 'bill',
            billType: 'mobile',
            amount: '70.0',
            clientCode: 'PD123456789',
            clientName: 'Chargement...',
            clientEmail: 'Chargement...',
            timestamp: new Date().toISOString()
        };

        document.addEventListener("DOMContentLoaded", async function() {
            const payBtn = document.querySelector('.custom-primary-btn');
            if (payBtn) {
                payBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    sessionStorage.removeItem('transferData'); // Nettoyer
                    currentBillData.timestamp = new Date().toISOString();
                    sessionStorage.setItem('billData', JSON.stringify(currentBillData));
                    window.location.href = this.getAttribute('href');
                });
            }

            try {
                // Récupérer les informations du profil utilisateur
                const profile = await api.getProfile();
                
                if (profile && !profile.error) {
                    const name = profile.fullName || profile.email.split('@')[0];
                    const email = profile.email;
                    
                    document.getElementById('clientName').textContent = name;
                    document.getElementById('clientEmail').textContent = email;
                    currentBillData.clientName = name;
                    currentBillData.clientEmail = email;
                }
            } catch (error) {
                console.error("Erreur chargement données", error);
                document.getElementById('clientName').textContent = 'Erreur';
                document.getElementById('clientEmail').textContent = 'Erreur';
            }
        });
    </script>
</body>

</html>

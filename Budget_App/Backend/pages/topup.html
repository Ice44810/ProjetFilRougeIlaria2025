<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recharge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/assets/style.css" />
    <script src="/public/js/api.js"></script>
    <style>
        .pin-input {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
        }

        .extra-small {
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="container">
        <div class="breadcrumb mt-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Accueil</a></li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <span class="bi bi-receipt text-primary" style="font-size: 15px;"></span>
                        Recharger
                    </li>
                </ol>
            </nav>
        </div>

        <div class="container py-3">
            <div class="balance-card p-3 border shadow-sm rounded-4 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-muted small">Solde disponible:</span>
                    <span class="fw-bold fs-5" id="currentBalance">€0,00</span>
                </div>
                <label class="form-label text-muted small">Montant à recharger</label>
                <div class="position-relative mb-4">
                    <input type="text" class="form-control amount-input ps-3 py-2" placeholder="€0" id="amountInput">
                    <i class="bi bi-x-circle-fill position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                        id="clearAmount" style="cursor: pointer;"></i>
                </div>
                <!-- Montant à recharger -->
                <p class="fw-bold mb-2">Montant</p>
                <div class="row g-2 mb-2">
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€50</button>
                    </div>
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€100</button>
                    </div>
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€200</button>
                    </div>
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€500</button>
                    </div>
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€1000</button>
                    </div>
                    <div class="col-4"><button type="button"
                            class="btn btn-primary w-100 amount-btn">€2000</button>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3" id="btnOpenConfirm">
                <button class="btn custom-primary-btn" type="button">Continuer</button>
                </a>
            </div>
        </div>
    </div>
    <!--Partie MODAL pour la CONFIRMATION -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4">
                    <h5 class="text-center fw-bold mb-4">Confirmer Rechargement</h5>
                    <p class="text-muted small">Choisir la Source</p>
                    <div class="d-flex align-items-center justify-content-between p-3 bg-light rounded-3 mb-4">
                        <div class="d-flex align-items-center">
                            <img id="confirmCardImg" src="../public/assets/images/icons8-visa-48.png" alt="Card"
                                width="35" class="me-3">
                            <div>
                                <div id="confirmCardBrand" class="fw-bold small">Chargement...</div>
                                <div id="confirmCardLast4" class="text-muted extra-small">****</div>
                            </div>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Montant</span>
                        <span class="fw-bold" id="confirmAmountDisplay">€0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-muted small">Frais</span>
                        <span class="text-success fw-bold small">Gratuit</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <div>
                            <div class="text-muted small">Total</div>
                            <div class="fw-bold fs-4 small" id="confirmTotalDisplay">€0</div>
                        </div>
                        <button class="btn btn-primary px-4 py-2 rounded-pill" id="btnToPin">
                            <i class="bi bi-shield-check me-2"></i>Recharger</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--Partie MODAL pour PIN -->
    <div class="modal fade" id="pinModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 p-4 text-center">
                <h5 class="fw-bold mb-4">Entrer votre PIN</h5>
                <div class="d-flex justify-content-center gap-2 mb-3">
                    <input type="password" class="form-control pin-input" maxlength="1" id="pin1">
                    <input type="password" class="form-control pin-input" maxlength="1" id="pin2">
                    <input type="password" class="form-control pin-input" maxlength="1" id="pin3">
                    <input type="password" class="form-control pin-input" maxlength="1" id="pin4">
                </div>
                <p class="text-muted small">Entrez votre PIN pour valider</p>
                <button class="btn btn-primary w-100 py-3 mt-4" id="btnToLoading">Continuer</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loadingModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 bg-transparent text-center">
                <div class="spinner-border text-white mb-3" style="width: 3rem; height: 3rem;"></div>
                <p class="text-white fw-bold">Encours...</p>
            </div>
        </div>
    </div>
    <!--Partie MODAL pour succes de la transaction -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 p-5 text-center bg-primary text-white overflow-hidden">
                <div class="bg-white rounded-4 p-4 text-dark shadow position-relative" style="z-index: 2;">
                    <div class="bg-success rounded-circle d-inline-flex p-3 mb-3 text-white">
                        <i class="bi bi-check-lg fs-1"></i>
                    </div>
                    <h4 class="fw-bold">Succes!</h4>
                    <p class="text-muted small">Votre recharge a été effectuée!</p>
                    <div class="my-4">
                        <span class="text-muted small">Total Recharge</span>
                        <h2 class="fw-bold text-primary" id="successAmountDisplay">€0</h2>
                    </div>
                    <div class="mb-3">
                        <span class="text-muted small">Nouveau Solde</span>
                        <h5 class="fw-bold text-success" id="newBalanceDisplay">€0</h5>
                    </div>
                    <button class="btn btn-primary py-3" id="btnDone">Terminer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Charger le solde actuel
            loadCurrentBalance();
            // Charger la carte pour le modal de confirmation
            loadTopupCard();

            // 1. Éléments de l'interface principale
            const amountInput = document.getElementById('amountInput');
            const amountBtns = document.querySelectorAll('.amount-btn');
            const clearBtn = document.getElementById('clearAmount');

            // 2. Instances des Modals Bootstrap
            const modalConfirm = new bootstrap.Modal(document.getElementById('confirmModal'));
            const modalPin = new bootstrap.Modal(document.getElementById('pinModal'));
            const modalLoading = new bootstrap.Modal(document.getElementById('loadingModal'));
            const modalSuccess = new bootstrap.Modal(document.getElementById('successModal'));

            let currentAmount = 0;

            // --- LOGIQUE DE SAISIE ---
            amountBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Extraire le montant du texte du bouton (enlève le symbole €)
                    const btnText = btn.textContent.trim();
                    amountInput.value = btnText;
                    currentAmount = parseFloat(btnText.replace('€', '').replace(',', '.'));
                });
            });

            clearBtn.addEventListener('click', () => {
                amountInput.value = '';
                currentAmount = 0;
                amountInput.focus();
            });

            // Mise à jour du montant lors de la saisie
            amountInput.addEventListener('input', (e) => {
                const value = e.target.value.replace('€', '').replace(',', '.');
                currentAmount = parseFloat(value) || 0;
            });

            // --- NAVIGATION ENTRE MODALS ---
            // Ouvrir Confirmation
            document.getElementById('btnOpenConfirm').addEventListener('click', () => {
                if (currentAmount <= 0) {
                    UI.showNotification('Veuillez entrer un montant valide', 'error');
                    return;
                }
                
                const formattedAmount = `€${currentAmount.toFixed(2)}`;
                document.getElementById('confirmAmountDisplay').textContent = formattedAmount;
                document.getElementById('confirmTotalDisplay').textContent = formattedAmount;
                modalConfirm.show();
            });

            // Confirmation -> PIN
            document.getElementById('btnToPin').addEventListener('click', () => {
                modalConfirm.hide();
                setTimeout(() => modalPin.show(), 400);
            });

            // PIN -> Chargement -> Succès (avec appel API réel)
            document.getElementById('btnToLoading').addEventListener('click', async () => {
                // Vérifier que le PIN est rempli (simulation - en production, vérifier le PIN réel)
                const pin1 = document.getElementById('pin1').value;
                const pin2 = document.getElementById('pin2').value;
                const pin3 = document.getElementById('pin3').value;
                const pin4 = document.getElementById('pin4').value;
                
                if (!pin1 || !pin2 || !pin3 || !pin4) {
                    UI.showNotification('Veuillez entrer votre PIN complet', 'error');
                    return;
                }

                modalPin.hide();
                setTimeout(() => modalLoading.show(), 400);

                try {
                    // Appel API pour le topup
                    const response = await fetch('/api/topup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: `amount=${currentAmount}`
                    });

                    const result = await response.json();

                    // Simulation du délai de traitement
                    setTimeout(() => {
                        modalLoading.hide();

                        if (result.success) {
                            // Afficher le succès avec le nouveau solde
                            document.getElementById('successAmountDisplay').textContent = `€${currentAmount.toFixed(2)}`;
                            document.getElementById('newBalanceDisplay').textContent = `€${parseFloat(result.balance).toFixed(2)}`;
                            
                            // Stocker le nouveau solde pour le partager avec les autres pages
                            localStorage.setItem('userBalance', result.balance);
                            
                            setTimeout(() => modalSuccess.show(), 400);
                        } else {
                            UI.showNotification(result.error || 'Erreur lors de la recharge', 'error');
                        }
                    }, 2000);
                } catch (error) {
                    console.error('Erreur topup:', error);
                    modalLoading.hide();
                    UI.showNotification('Erreur de connexion au serveur', 'error');
                }
            });

            // Succès vers la page Home
            document.getElementById('btnDone').addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            // --- BONUS : AUTO-FOCUS PIN ---
            const pinInputs = [
                document.getElementById('pin1'),
                document.getElementById('pin2'),
                document.getElementById('pin3'),
                document.getElementById('pin4')
            ];

            pinInputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value && index < pinInputs.length - 1) {
                        pinInputs[index + 1].focus();
                    }
                });
                
                // Gérer la touche Backspace
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        pinInputs[index - 1].focus();
                    }
                });
            });
        });

        // Charger le solde actuel depuis l'API
        async function loadCurrentBalance() {
            try {
                const data = await api.getHomeData();
                const balance = parseFloat(data.balance);
                document.getElementById('currentBalance').textContent = `€${balance.toFixed(2)}`;
                // Stocker le solde dans le localStorage pour le partager
                localStorage.setItem('userBalance', balance);
            } catch (error) {
                console.error('Erreur chargement solde:', error);
                document.getElementById('currentBalance').textContent = '€0,00';
            }
        }

        // Charger la carte principale pour le rechargement
        async function loadTopupCard() {
            try {
                const cards = await api.getCards();
                const cardImg = document.getElementById('confirmCardImg');
                const cardBrand = document.getElementById('confirmCardBrand');
                const cardLast4 = document.getElementById('confirmCardLast4');
                
                if (cards && cards.length > 0) {
                    const card = cards[0]; // On prend la première carte par défaut
                    cardBrand.textContent = card.card_brand;
                    cardLast4.textContent = `**** ${card.last_4_digits}`;
                    cardImg.src = card.card_brand === 'Visa' ? 
                        'https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg' : 
                        'https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg';
                } else {
                    cardBrand.textContent = 'Aucune carte';
                    cardLast4.textContent = 'Veuillez en ajouter une';
                }
            } catch (error) {
                console.error('Erreur chargement carte:', error);
            }
        }
    </script>

</body>

</html>

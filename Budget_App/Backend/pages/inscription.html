<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="/public/assets/style.css" />
</head>

<body>
    <div class="container-fluid bg-white mb-2 mt-4">
        <div class="d-flex align-items-center p-3">
            <h5 class="mb-0 fw-semibold flex-grow-1 text-center">Inscription</h5>
        </div>
    </div>

    <form id="registerForm" class="container-md shadow-sm p-4 rounded-3 border">
        <div class="mb-3 px-3">
            <label for="nom" class="form-label">Nom complet</label>
            <input type="text" class="form-control" id="nom" name="fullName" placeholder="Saisir votre nom" required />
        </div>
        <div class="mb-3 px-3">
            <label for="email" class="form-label">Adresse Mail</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Saisir adresse mail" required />
        </div>
        <div class="mb-3 px-3">
            <label for="motdepasse" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="motdepasse" name="password" placeholder="Saisir mot de passe" required />
        </div>
        <div class="mb-3 px-3">
            <label for="confirmmotdepasse" class="form-label">Confirmer Mot de passe</label>
            <input type="password" class="form-control" id="confirmmotdepasse" placeholder="Confirmer mot de passe" required />
        </div>
        <div class="d-flex justify-content-end mt-3 mx-3 fs-4">
            <button type="submit" id="submitBtn" class="btn btn-primary">S'inscrire</button>
        </div>
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById("registerForm");

            if (registerForm) {
                registerForm.addEventListener("submit", async function (event) {
                    event.preventDefault();

                    const submitBtn = document.getElementById("submitBtn");
                    const originalBtnText = submitBtn.textContent;

                    // Récupération des valeurs
                    const nom = document.getElementById("nom").value.trim();
                    const email = document.getElementById("email").value.trim();
                    const motdepasse = document.getElementById("motdepasse").value.trim();
                    const confirmMotDePasse = document.getElementById("confirmmotdepasse").value.trim();

                    // 1. Validation de base
                    if (!nom || !email || !motdepasse || !confirmMotDePasse) {
                        alert("Tous les champs doivent être remplis.");
                        return;
                    }

                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        alert("Adresse mail invalide.");
                        return;
                    }

                    if (motdepasse.length < 6) {
                        alert("Le mot de passe doit contenir au moins 6 caractères.");
                        return;
                    }

                    if (motdepasse !== confirmMotDePasse) {
                        alert("Les mots de passe ne correspondent pas.");
                        return;
                    }

                    // Désactivation du bouton pendant l'envoi
                    submitBtn.disabled = true;
                    submitBtn.textContent = "Inscription en cours...";

                    // 2. Préparation des données (Format URL-encoded pour Node.js natif)
                    const formData = new URLSearchParams();
                    formData.append('fullName', nom);
                    formData.append('email', email);
                    formData.append('password', motdepasse);

                    try {
                        const response = await fetch('/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: formData
                        });

                        // 3. Traitement de la réponse
                        if (response.ok) {
                            // On tente de lire le JSON si le serveur en envoie, sinon on continue
                            let message = "Inscription réussie !";
                            try {
                                const data = await response.json();
                                if (data.message) message = data.message;
                            } catch (e) { /* Pas de JSON, pas grave */ }
                            
                            alert(message);
                            window.location.href = "/login.html"; // Redirection côté client
                        } else {
                            let errorMsg = "L'inscription a échoué.";
                            try {
                                const errorData = await response.json();
                                errorMsg = errorData.message || errorMsg;
                            } catch (e) {
                                errorMsg = `Erreur serveur (${response.status})`;
                            }
                            alert(errorMsg);
                        }
                    } catch (error) {
                        console.error("Erreur réseau :", error);
                        alert("Impossible de contacter le serveur.");
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalBtnText;
                    }
                });
            }
        });
    </script>
</body>

</html>

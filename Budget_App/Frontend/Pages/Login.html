<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Budget App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../Public/Assets/style.css" />

</head>

<body>
    <header>
        <h5 class="text-center fw-semibold mb-4 fs-4 mt-5">Connexion</h5>
    </header>

    <form class="mb-3 mx-3 mt-5" id="loginForm">
        <div class="mb-4 position-relative">
            <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -13px; left: 0;">
                Email
            </label>
            <div class="border shadow-sm rounded-3 px-3 d-flex align-items-center" style="height: 50px;">
                <input type="email" id="userIdentifier" class="form-control small border-0 bg-transparent"
                    placeholder="Exemple@gmail.com" style="box-shadow: none;" required>
            </div>
        </div>

        <div class="mb-4 position-relative">
            <label class="position-absolute px-2 ms-3 text-muted fs-6" style="top: -13px; left: 0; z-index: 5;">
                Mot de passe
            </label>
            <div class="border shadow-sm rounded-3 px-3 d-flex align-items-center" style="height: 50px;">
                <input type="password" id="passwordInput" class="form-control border-0 bg-transparent"
                    placeholder="Mot de passe" style="box-shadow: none;" required>
                <i class="bi bi-eye text-muted" id="togglePassword" style="cursor: pointer;"></i>
            </div>
        </div>

        <div class="mb-3 d-flex justify-content-between align-items-center">
            <a href="./resetpassword.html" class="text-decoration-none">
                <p class="text-muted mb-0 fs-6">Mot de passe oublié ?</p>
            </a>
            <button type="submit" id="btnLogin" class="btn custom-primary-btn">Se connecter</button>
        </div>
    </form>

    <div class="d-flex justify-content-center align-items-center my-4">
        <hr class="w-100 mx-3">
        <p class="text-muted fs-6 mb-0 position-absolute px-2">Ou</p>
    </div>

    <div class="buttons-group px-3 mt-3">
        <button class="btn btn-outline-primary mt-2 w-100 fs-5">
            <i class="bi bi-facebook"></i> Se connecter avec Facebook
        </button>
        <button class="btn btn-outline-danger mt-2 w-100 fs-5">
            <i class="bi bi-google"></i> Se connecter avec Google
        </button>
        <button class="btn btn-outline-dark mt-2 w-100 fs-5">
            <i class="bi bi-apple"></i> Se connecter avec Apple
        </button>
        <div class="text-center mt-3">
            <small class="text-muted">Vous n'avez pas de compte ?</small>
            <a href="./inscription.html" class="text-decoration-none">S'inscrire ici</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById("loginForm");
        // On sélectionne par ID pour être plus précis
        const emailInput = document.getElementById("userIdentifier");
        const passwordInput = document.getElementById("passwordInput");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            // Simple simulation
            console.log("Tentative de connexion...", { email, password });
            alert(`Succès ! Redirection...`);

            // Redirection via JS
            window.location.href = "./index.html";
        });

        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.getElementById('togglePassword');

            if (!passwordInput || !toggleIcon) return;

            toggleIcon.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';

                passwordInput.type = isPassword ? 'text' : 'password';

                toggleIcon.classList.toggle('bi-eye', !isPassword);
                toggleIcon.classList.toggle('bi-eye-slash', isPassword);
            });
        });

    </script>
</body>

</html>
